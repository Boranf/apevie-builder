async function unlock(pw){const enc=new TextEncoder();const baseKey=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(BLOB.salt),iterations:BLOB.it,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt']);const ptx=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(BLOB.iv)},key,b64(BLOB.ct));return new TextDecoder().decode(ptx);}
